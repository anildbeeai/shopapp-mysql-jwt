<div class="card profile-card">
  <div class="card-body" style="padding:2.5rem; text-align:center">
    <div class="profile-avatar">{{user.name[0]}}</div>
    <div class="profile-name">{{user.name}}</div>
    <div class="profile-email">{{user.email}}</div>
    <div class="mt-1 mb-2">
      <span class="badge" ng-class="user.role === 'admin' ? 'badge-admin' : 'badge-user'">
        {{user.role === 'admin' ? '👑 Administrator' : '👤 User'}}
      </span>
    </div>

    <div class="card" style="text-align:left; margin:1.5rem 0; box-shadow:none; border:2px solid #e2e8f0">
      <div class="card-body" style="padding:1rem 1.5rem">
        <p style="font-size:.85rem; color:#64748b; margin-bottom:.25rem">User ID</p>
        <p style="font-weight:600">#{{user.id}}</p>
        <hr style="margin:.75rem 0; border:none; border-top:1px solid #e2e8f0">
        <p style="font-size:.85rem; color:#64748b; margin-bottom:.25rem">Account Type</p>
        <p style="font-weight:600; text-transform:capitalize">{{user.role}}</p>
      </div>
    </div>

    <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap">
      <a href="#!/products" class="btn btn-primary">🛍️ Browse Products</a>
      <button class="btn btn-secondary" ng-click="logout()">🚪 Sign Out</button>
    </div>
  </div>
</div>
