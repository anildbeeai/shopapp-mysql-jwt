<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Create Account ✨</h2>
    <p class="auth-subtitle">Join ShopApp and start shopping today</p>

    <div class="alert alert-danger" ng-if="error">{{error}}</div>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input class="form-control" type="text" placeholder="John Doe" ng-model="form.name" />
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-control" type="email" placeholder="you@example.com" ng-model="form.email" />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" placeholder="Minimum 6 characters" ng-model="form.password" />
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-control" type="password" placeholder="Repeat password" ng-model="form.confirmPassword" ng-keyup="$event.keyCode == 13 && register()" />
    </div>

    <button class="btn btn-primary full-width" ng-click="register()" ng-disabled="loading">
      <span ng-if="!loading">Create Account →</span>
      <span ng-if="loading">Creating account...</span>
    </button>

    <div class="auth-footer">
      Already have an account? <a href="#!/login" class="auth-link">Sign in</a>
    </div>
  </div>
</div>
