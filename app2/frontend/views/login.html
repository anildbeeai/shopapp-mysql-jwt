<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Welcome Back 👋</h2>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <div class="alert alert-danger" ng-if="error">{{error}}</div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-control" type="email" placeholder="you@example.com" ng-model="form.email" ng-keyup="$event.keyCode == 13 && login()" />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" placeholder="••••••••" ng-model="form.password" ng-keyup="$event.keyCode == 13 && login()" />
    </div>

    <button class="btn btn-primary full-width" ng-click="login()" ng-disabled="loading">
      <span ng-if="!loading">Sign In →</span>
      <span ng-if="loading">Signing in...</span>
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="#!/register" class="auth-link">Create one</a>
    </div>

    <div class="alert alert-success mt-2" style="font-size:.8rem">
      <strong>Demo credentials:</strong><br>
      Admin: admin@example.com / admin123<br>
      User: user@example.com / user123
    </div>
  </div>
</div>
