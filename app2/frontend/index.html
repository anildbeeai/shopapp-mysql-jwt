<!DOCTYPE html>
<html lang="en" ng-app="shopApp">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopApp - Modern Store</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" ng-controller="NavCtrl">
    <div class="nav-brand">
      <span class="brand-icon">🛒</span>
      <span>ShopApp</span>
    </div>
    <ul class="nav-links">
      <li><a href="#!/home" ng-class="{active: isActive('home')}">Home</a></li>
      <li><a href="#!/products" ng-class="{active: isActive('products')}">Products</a></li>
      <li ng-if="!isLoggedIn()"><a href="#!/login" ng-class="{active: isActive('login')}">Login</a></li>
      <li ng-if="!isLoggedIn()"><a href="#!/register" ng-class="{active: isActive('register')}">Register</a></li>
      <li ng-if="isLoggedIn()"><a href="#!/profile" ng-class="{active: isActive('profile')}">👤 {{userName()}}</a></li>
      <li ng-if="isLoggedIn()"><a href="" ng-click="logout()">Logout</a></li>
    </ul>
  </nav>

  <!-- Toast Notification -->
  <div class="toast" ng-controller="ToastCtrl" ng-if="toast.show" ng-class="toast.type">
    {{toast.message}}
  </div>

  <!-- Main content -->
  <main class="main-content">
    <div ng-view></div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2024 ShopApp. Built with AngularJS + Go JWT API.</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/services/auth.service.js"></script>
  <script src="js/services/product.service.js"></script>
  <script src="js/controllers/nav.controller.js"></script>
  <script src="js/controllers/toast.controller.js"></script>
  <script src="js/controllers/home.controller.js"></script>
  <script src="js/controllers/auth.controller.js"></script>
  <script src="js/controllers/product.controller.js"></script>
  <script src="js/controllers/profile.controller.js"></script>
</body>
</html>
