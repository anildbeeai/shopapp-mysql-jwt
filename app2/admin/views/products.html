<!-- Toolbar -->
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem">
  <input class="form-control" style="max-width:250px" type="text" placeholder="🔍 Search products..." ng-model="search" />
  <button class="btn btn-primary" ng-click="openCreate()">+ Add Product</button>
</div>

<!-- Loading -->
<div ng-if="loading" style="text-align:center; padding:2rem"><div class="spinner"></div></div>

<!-- Table -->
<div class="card" ng-if="!loading">
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Description</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-repeat="p in filteredProducts() track by p.id">
          <td class="text-muted">#{{p.id}}</td>
          <td style="font-weight:600">{{p.name}}</td>
          <td class="text-muted">{{p.description | limitTo:40}}{{p.description.length > 40 ? '...' : ''}}</td>
          <td style="color:#6366f1; font-weight:700">${{p.price}}</td>
          <td><span class="badge badge-success">{{p.stock}}</span></td>
          <td>
            <div style="display:flex; gap:.5rem">
              <button class="btn btn-secondary btn-sm" ng-click="openEdit(p)">✏️ Edit</button>
              <button class="btn btn-danger btn-sm" ng-click="delete(p)">🗑️ Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="empty-state" ng-if="filteredProducts().length === 0">
      <div class="icon">📦</div>
      <p>No products found</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" ng-if="showModal">
  <div class="modal">
    <div class="modal-header">
      {{editMode ? '✏️ Edit Product' : '➕ Add Product'}}
      <button class="modal-close" ng-click="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Product Name *</label>
        <input class="form-control" type="text" placeholder="Enter product name" ng-model="form.name" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-control" type="text" placeholder="Enter description" ng-model="form.description" />
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem">
        <div class="form-group">
          <label class="form-label">Price ($) *</label>
          <input class="form-control" type="number" step="0.01" placeholder="0.00" ng-model="form.price" />
        </div>
        <div class="form-group">
          <label class="form-label">Stock</label>
          <input class="form-control" type="number" placeholder="0" ng-model="form.stock" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" ng-click="closeModal()">Cancel</button>
      <button class="btn btn-primary" ng-click="save()" ng-disabled="saving">
        {{saving ? 'Saving...' : (editMode ? 'Update' : 'Create')}}
      </button>
    </div>
  </div>
</div>
