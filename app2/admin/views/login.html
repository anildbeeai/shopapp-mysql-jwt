<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">⚙️</div>
    <h2 class="auth-title">Admin Panel</h2>
    <p class="auth-subtitle">Sign in with admin credentials to continue</p>

    <div class="alert alert-danger" ng-if="error">{{error}}</div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-control" type="email" placeholder="admin@example.com"
             ng-model="form.email" ng-keyup="$event.keyCode == 13 && login()" />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" placeholder="••••••••"
             ng-model="form.password" ng-keyup="$event.keyCode == 13 && login()" />
    </div>

    <button class="btn btn-primary full-width" ng-click="login()" ng-disabled="loading">
      <span ng-if="!loading">Sign In →</span>
      <span ng-if="loading">Signing in...</span>
    </button>

    <div class="alert alert-info mt-2" style="font-size:.8rem; margin-bottom:0">
      <strong>Demo:</strong> admin@example.com / admin123
    </div>
  </div>
</div>
