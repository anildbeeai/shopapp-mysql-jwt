<!DOCTYPE html>
<html lang="en" ng-app="adminApp">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopApp Admin Panel</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body ng-controller="RootCtrl">

  <!-- Login page (no sidebar) -->
  <div ng-if="!isLoggedIn()">
    <div ng-view></div>
  </div>

  <!-- Admin layout -->
  <div class="admin-layout" ng-if="isLoggedIn()">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>⚙️ Admin Panel</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#!/dashboard" ng-class="{active: isActive('dashboard')}">📊 Dashboard</a>
        <a href="#!/products"  ng-class="{active: isActive('products')}">📦 Products</a>
        <a href="#!/users"     ng-class="{active: isActive('users')}">👥 Users</a>
      </nav>
      <div class="sidebar-footer">
        <div class="admin-info">
          <div class="admin-avatar">{{getInitial()}}</div>
          <div>
            <div class="admin-name">{{getUserName()}}</div>
            <div class="admin-role">Administrator</div>
          </div>
        </div>
        <button class="btn-logout" ng-click="logout()">🚪 Logout</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="page-title" ng-bind="pageTitle"></h1>
        <span class="topbar-badge">Admin</span>
      </div>

      <!-- Toast -->
      <div class="toast" ng-controller="ToastCtrl" ng-if="toast.show" ng-class="toast.type">
        {{toast.message}}
      </div>

      <div class="admin-content" ng-view></div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/services/auth.service.js"></script>
  <script src="js/services/api.service.js"></script>
  <script src="js/controllers/root.controller.js"></script>
  <script src="js/controllers/toast.controller.js"></script>
  <script src="js/controllers/login.controller.js"></script>
  <script src="js/controllers/dashboard.controller.js"></script>
  <script src="js/controllers/products.controller.js"></script>
  <script src="js/controllers/users.controller.js"></script>
</body>
</html>
